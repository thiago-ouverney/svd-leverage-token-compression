<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#444"/>
    </marker>
    <style>
      .title { font: bold 18px sans-serif; fill: #222; }
      .box-title { font: bold 11px sans-serif; fill: #222; }
      .box-text { font: 11px sans-serif; fill: #333; }
      .small { font: 10px sans-serif; fill: #555; }
    </style>
  </defs>
  <rect width="1100" height="620" fill="#ffffff"/>
  <text x="550" y="36" text-anchor="middle" class="title">Pipeline experimental — SVD + baselines (IMDb)</text>

  <!-- Linha principal -->
  <g id="imdb">
    <rect x="30" y="70" width="160" height="85" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
    <text x="110" y="100" text-anchor="middle" class="box-title">Review IMDb</text>
    <text x="110" y="120" text-anchor="middle" class="box-text">400 amostras</text>
    <text x="110" y="137" text-anchor="middle" class="box-text">split 70/30</text>
  </g>
  <g id="embed">
    <rect x="220" y="70" width="190" height="85" rx="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="315" y="98" text-anchor="middle" class="box-title">MiniLM-L6-v2</text>
    <text x="315" y="118" text-anchor="middle" class="box-text">hidden states token-level</text>
    <text x="315" y="138" text-anchor="middle" class="box-text">F ? R^{T×384}</text>
  </g>
  <g id="poda">
    <rect x="440" y="70" width="210" height="85" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
    <text x="545" y="98" text-anchor="middle" class="box-title">Operador de poda</text>
    <text x="545" y="118" text-anchor="middle" class="box-text">? ? {0.75, 0.50, 0.25, 0.125}</text>
    <text x="545" y="138" text-anchor="middle" class="box-text">T' = max(1, floor(?T))</text>
  </g>
  <g id="fpoda">
    <rect x="690" y="70" width="160" height="85" rx="10" fill="#E8F0FE" stroke="#1f77b4" stroke-width="1.5"/>
    <text x="770" y="105" text-anchor="middle" class="box-title">Matriz podada</text>
    <text x="770" y="130" text-anchor="middle" class="box-text">F[S,:]</text>
  </g>
  <g id="methods">
    <rect x="440" y="195" width="210" height="90" rx="10" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.5"/>
    <text x="545" y="222" text-anchor="middle" class="box-title">6 operadores</text>
    <text x="545" y="245" text-anchor="middle" class="box-text">full | random | norm</text>
    <text x="545" y="265" text-anchor="middle" class="box-text">first | svd | svd_energia</text>
  </g>

  <!-- Bifurcacao pos-poda -->
  <g id="metricas-a">
    <rect x="80" y="340" width="320" height="95" rx="10" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
    <text x="240" y="370" text-anchor="middle" class="box-title">(A) Métricas algébricas</text>
    <text x="240" y="395" text-anchor="middle" class="box-text">C | E_k^energia | R_k (SVD)</text>
  </g>
  <g id="downstream-b">
    <rect x="620" y="340" width="360" height="95" rx="10" fill="#E8F0FE" stroke="#1f77b4" stroke-width="1.5"/>
    <text x="800" y="370" text-anchor="middle" class="box-title">(B) Avaliaçăo downstream</text>
    <text x="800" y="395" text-anchor="middle" class="box-text">pooling + L2 + Ridge (?=1) ? acurácia</text>
  </g>
  <g id="footer">
    <rect x="180" y="490" width="740" height="70" rx="10" fill="#FAFAFA" stroke="#616161" stroke-width="1.5"/>
    <text x="550" y="520" text-anchor="middle" class="box-title">Treino e teste: mesmo operador e ?</text>
    <text x="550" y="542" text-anchor="middle" class="box-text">Métricas (A) e (B) reportadas separadamente</text>
  </g>

  <!-- Setas -->
  <line x1="190" y1="112" x2="215" y2="112" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="112" x2="435" y2="112" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="112" x2="685" y2="112" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="545" y1="155" x2="545" y2="190" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="560" y="178" class="small">6 métodos</text>
  <line x1="770" y1="155" x2="770" y2="200" stroke="#444" stroke-width="1.5"/>
  <line x1="770" y1="200" x2="240" y2="335" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="770" y1="200" x2="800" y2="335" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="785" y="218" class="small">pós-poda</text>
  <line x1="240" y1="435" x2="400" y2="485" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="435" x2="700" y2="485" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
